services:
  - type: web
    name: travel-explorer
    env: node
    region: singapore          # 新加坡節點，台灣連線最快
    plan: free
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      # 以下變數在 Render Dashboard 手動填入，不寫在這裡（安全考量）
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false             # 填入 https://你的名字.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: LINE_CLIENT_ID
        sync: false
      - key: LINE_CLIENT_SECRET
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false             # 填入 https://你的名字.onrender.com/api
      - key: AUTH_TRUST_HOST
        value: "true"           # 必填！next-auth v5 在非 Vercel 環境需要這個
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
